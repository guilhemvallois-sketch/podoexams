<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PodoExamen">
<meta name="theme-color" content="#1D9E75">
<title>PodoExamen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{--bg:#f5f5f4;--surface:#fff;--surface2:#f4f4f3;--border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.2);--text:#1a1a1a;--text2:#666;--text3:#999;--teal:#1D9E75;--teal-light:#E1F5EE;--teal-mid:#0F6E56;--teal-pale:#9FE1CB;--red:#E24B4A;--red-light:#FCEBEB;--blue-light:#E6F1FB;--blue:#185FA5;--orange:#E87A1D;--orange-light:#FFF3E0;--radius:10px;--radius-sm:7px;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#252525;--surface2:#2e2e2e;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);--text:#f0f0f0;--text2:#aaa;--text3:#666;--teal-light:#0a3d2e;--teal-pale:#0f5c42;--red-light:#3a1515;--blue-light:#0a1e35;--orange-light:#2a1800;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px;}
.logo{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.logo i{color:var(--teal);font-size:20px;}
.tabs{display:flex;gap:3px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.tab.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:500;}
.tab.active.sport{background:var(--orange);border-color:var(--orange);}
.tab.active.concl{background:#7C3AED;border-color:#7C3AED;}
.tbtn{padding:6px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.tbtn.green{background:var(--teal);color:#fff;border-color:var(--teal);}
.main{padding:12px;max-width:900px;margin:0 auto;}
.screen{display:none;}.screen.active{display:block;}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px;}
.card-hd{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.card-hd i{font-size:15px;color:var(--teal);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fg{display:flex;flex-direction:column;gap:3px;}.fg.full{grid-column:1/-1;}
.flbl{font-size:12px;color:var(--text2);}
.finput{padding:8px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;font-family:inherit;width:100%;}
.finput:focus{outline:none;border-color:var(--teal);}
textarea.finput{resize:vertical;min-height:65px;}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px;}
.ci{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--surface2);cursor:pointer;user-select:none;}
.ci.chk{background:var(--teal-light);border-color:var(--teal);}
.ci.chk .cb{background:var(--teal);border-color:var(--teal);}
.ci.chk .cb i{display:block;}
.cb{width:17px;height:17px;border-radius:3px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface);}
.cb i{display:none;color:#fff;font-size:11px;}
.clbl{font-size:12px;color:var(--text);line-height:1.3;}
.rg{display:flex;gap:5px;flex-wrap:wrap;}
.ri{padding:6px 11px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);font-size:13px;cursor:pointer;color:var(--text2);user-select:none;}
.ri.sel{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:500;}
.sfield{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;font-family:inherit;}
.savebtn{width:100%;padding:12px;border-radius:var(--radius);background:var(--teal);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px;}
.pclist{display:flex;flex-direction:column;gap:7px;}
.pc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.pav{width:40px;height:40px;border-radius:50%;background:var(--teal-light);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.pi{flex:1;min-width:0;}
.pn{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm{font-size:12px;color:var(--text2);margin-top:2px;}
.pacts{display:flex;gap:5px;}
.ib{width:30px;height:30px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px;}
.ib.danger:active{background:var(--red-light);color:var(--red);}
.empty{text-align:center;padding:36px 16px;color:var(--text2);}
.empty i{font-size:38px;color:var(--border2);margin-bottom:10px;display:block;}
.empty p{font-size:14px;line-height:1.6;}
.badge{padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:var(--teal-light);color:var(--teal-mid);}
.badge.gray{background:var(--surface2);color:var(--text2);}
.badge.blue{background:var(--blue-light);color:var(--blue);}
.esec{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.eshd{padding:11px 13px;display:flex;align-items:center;gap:7px;background:var(--surface2);border-bottom:.5px solid var(--border);cursor:pointer;}
.estitle{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.esbody{padding:12px 13px;}
.eir{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.eiinput{flex:1;padding:7px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;}
.eiinput:focus{outline:none;border-color:var(--teal);}
.tsel{padding:7px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;font-family:inherit;}
.addbtn{width:100%;padding:7px;border:1px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
.secadd{width:100%;padding:10px;border:1.5px dashed var(--teal-pale);border-radius:var(--radius);background:var(--teal-light);color:var(--teal-mid);font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;padding:9px 18px;border-radius:var(--radius);font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.moverlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:20px;width:100%;max-width:310px;border:.5px solid var(--border2);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:7px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;}
.macts{display:flex;gap:7px;justify-content:flex-end;}
.bghost{padding:7px 13px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;font-family:inherit;color:var(--text2);}
.bdanger{padding:7px 13px;border-radius:var(--radius-sm);border:none;background:var(--red);color:#fff;cursor:pointer;font-size:13px;font-family:inherit;}
.nota{font-size:12px;color:var(--text2);font-style:italic;padding:7px 10px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--teal);}
.srch-wrap{position:relative;margin-bottom:10px;}
.srch-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none;}
.srch{width:100%;padding:9px 12px 9px 34px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;}
.srch:focus{outline:none;border-color:var(--teal);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hdr-title{font-size:17px;font-weight:600;color:var(--text);}
.hcount{font-size:12px;color:var(--text2);margin-bottom:8px;}
.pdetail-nav{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.pdetail-back{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--teal);cursor:pointer;}
.pdetail-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.pdetail-tab{padding:6px 13px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
.pdetail-tab.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.hist-hd{padding:11px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.hist-date{font-size:14px;font-weight:500;color:var(--text);flex:1;}
.hist-body{padding:12px 13px;border-top:.5px solid var(--border);}
.hfield{margin-bottom:7px;}
.hflbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.hfval{font-size:13px;color:var(--text);line-height:1.5;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{padding:2px 7px;border-radius:20px;font-size:12px;background:var(--teal-light);color:var(--teal-mid);}
.collapse-icon{transition:transform .2s;font-size:13px;color:var(--text3);}
.collapse-icon.open{transform:rotate(180deg);}
.sect-label{font-size:12px;font-weight:600;color:var(--teal);margin:10px 0 5px;}
/* Posto */
.posto-section{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px;}
.posto-sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.posto-sec-title i{font-size:15px;color:var(--teal);}
.posto-subsection{font-size:11px;font-weight:600;color:var(--teal);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.04em;}
.test-row{display:grid;grid-template-columns:1fr auto auto;align-items:start;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);}
.test-row:last-child{border-bottom:none;}
.test-name{font-size:13px;color:var(--text);font-weight:500;padding-top:4px;}
.test-name small{display:block;font-size:11px;color:var(--text3);font-weight:400;margin-top:2px;line-height:1.3;}
.test-side{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:60px;}
.side-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.side-btns{display:flex;gap:3px;}
.sbtn{width:28px;height:28px;border-radius:6px;border:.5px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.sbtn.pos{background:var(--red-light);border-color:var(--red);color:var(--red);}
.sbtn.neg{background:var(--teal-light);border-color:var(--teal);color:var(--teal);}
.test-note-wrap{grid-column:1/-1;padding-bottom:4px;}
.test-note{width:100%;padding:5px 8px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-family:inherit;resize:none;}
.test-note:focus{outline:none;border-color:var(--teal);}
.legend-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.leg-dot{width:13px;height:13px;border-radius:3px;border:.5px solid;}
/* Sport */
.sport-section{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px;}
.sport-sec-title{font-size:11px;font-weight:600;color:var(--orange);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sport-subsection{font-size:11px;font-weight:600;color:var(--orange);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.04em;}
.score-row{display:grid;grid-template-columns:1fr auto;align-items:start;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);}
.score-row:last-child{border-bottom:none;}
.sport-test-row{display:grid;grid-template-columns:1fr auto auto;align-items:start;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);}
.sport-test-row:last-child{border-bottom:none;}
.score-input{width:70px;padding:7px 6px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;font-family:inherit;text-align:center;}
.score-unit{font-size:11px;color:var(--text3);margin-top:2px;text-align:center;}
.result-select{padding:7px 8px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;}
.result-select.ok{border-color:var(--teal);color:var(--teal);}
.result-select.nok{border-color:var(--red);color:var(--red);}
.result-select.lim{border-color:var(--orange);color:var(--orange);}
/* Conclusion */
.concl-block{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px;}
.concl-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.concl-title i{font-size:17px;}
.concl-item{display:flex;align-items:baseline;gap:7px;padding:5px 0;border-bottom:.5px solid var(--border);font-size:13px;}
.concl-item:last-child{border-bottom:none;}
.concl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.concl-zone{font-size:11px;color:var(--text3);min-width:85px;flex-shrink:0;}
.concl-val{color:var(--text);flex:1;}
.concl-side{font-size:11px;font-weight:600;padding:1px 6px;border-radius:10px;background:var(--surface2);color:var(--text2);}
.concl-empty{text-align:center;padding:14px;color:var(--text3);font-size:13px;font-style:italic;}
.pdf-btn{width:100%;padding:12px;border-radius:var(--radius);background:#2563EB;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px;}
.note-textarea{width:100%;padding:9px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:80px;}
.note-textarea:focus{outline:none;border-color:var(--teal);}
@media(max-width:480px){.pgrid{grid-template-columns:1fr;}.logo span{display:none;}}


</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><i class="ti ti-stethoscope"></i><span>PodoExamen</span></div>
  <div class="tabs">
    <button class="tab active" onclick="showScreen('patients')"><i class="ti ti-users"></i> Patients</button>
    <button class="tab" onclick="showScreen('exam')"><i class="ti ti-clipboard-list"></i> Examen</button>
    <button class="tab" onclick="showScreen('posto')"><i class="ti ti-body-scan"></i> Posturo</button>
    <button class="tab" onclick="showScreen('sport')"><i class="ti ti-run"></i> Sport</button>
    <button class="tab" onclick="showScreen('conclusion')"><i class="ti ti-report-analytics"></i> Conclusion</button>
    <button class="tab" onclick="showScreen('edit')"><i class="ti ti-settings"></i> Édition</button>
  </div>
  <button class="tbtn green" onclick="exportPDF()"><i class="ti ti-printer"></i></button>
</div>
<div class="main">
  <!-- PATIENTS -->
  <div id="screen-patients" class="screen active">
    <div class="hdr-row"><div class="hdr-title">Patients</div><button class="tbtn green" onclick="newPatient()"><i class="ti ti-plus"></i> Nouveau</button></div>
    <div class="srch-wrap"><i class="ti ti-search"></i><input class="srch" type="search" placeholder="Rechercher…" oninput="filterPatients(this.value)"></div>
    <div id="pcount" class="hcount"></div>
    <div id="plist" class="pclist"></div>
  </div>
  <!-- EXAM -->
  <div id="screen-exam" class="screen">
    <div id="exam-nop" style="display:none"><div class="empty"><i class="ti ti-user-question"></i><p>Aucun patient sélectionné.</p><button class="savebtn" style="width:auto;padding:9px 18px;margin:12px auto 0;" onclick="showScreen('patients')"><i class="ti ti-users"></i> Voir la liste</button></div></div>
    <div id="exam-content"></div>
  </div>
  <!-- POSTUROLOGIE -->
  <div id="screen-posto" class="screen">
    <div id="posto-nop" style="display:none"><div class="empty"><i class="ti ti-user-question"></i><p>Aucun patient sélectionné.</p><button class="savebtn" style="width:auto;padding:9px 18px;margin:12px auto 0;" onclick="showScreen('patients')"><i class="ti ti-users"></i> Voir la liste</button></div></div>
    <div id="posto-content"></div>
  </div>
  <!-- SPORT -->
  <div id="screen-sport" class="screen">
    <div id="sport-nop" style="display:none"><div class="empty"><i class="ti ti-user-question"></i><p>Aucun patient sélectionné.</p><button class="savebtn" style="width:auto;padding:9px 18px;margin:12px auto 0;" onclick="showScreen('patients')"><i class="ti ti-users"></i> Voir la liste</button></div></div>
    <div id="sport-content"></div>
  </div>
  <!-- CONCLUSION -->
  <div id="screen-conclusion" class="screen">
    <div id="concl-nop" style="display:none"><div class="empty"><i class="ti ti-user-question"></i><p>Aucun patient sélectionné.</p><button class="savebtn" style="width:auto;padding:9px 18px;margin:12px auto 0;" onclick="showScreen('patients')"><i class="ti ti-users"></i> Voir la liste</button></div></div>
    <div id="concl-content"></div>
  </div>

  <!-- EDITION -->
  <div id="screen-edit" class="screen">
    <div class="hdr-row"><div class="hdr-title">Configuration des grilles</div></div>
    <div class="pdetail-tabs" style="margin-bottom:12px;">
      <button class="pdetail-tab active" id="etab-exam" onclick="switchEditTab('exam')"><i class="ti ti-clipboard-list" style="font-size:12px"></i> Examen</button>
      <button class="pdetail-tab" id="etab-posto" onclick="switchEditTab('posto')"><i class="ti ti-body-scan" style="font-size:12px"></i> Posturologie</button>
      <button class="pdetail-tab" id="etab-sport" onclick="switchEditTab('sport')"><i class="ti ti-run" style="font-size:12px"></i> Sport</button>
    </div>
    <div id="edit-content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="moverlay" id="moverlay">
  <div class="modal">
    <h3 id="mtitle">Confirmation</h3><p id="mmsg"></p>
    <div class="macts"><button class="bghost" onclick="closeMod()">Annuler</button><button class="bdanger" id="mconfirm">Supprimer</button></div>
  </div>
</div>

</div>
<script>

// ── DB ──
const DB={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};

// ── DEFAULT TEMPLATE ──
const DEFAULT_TPL=[
  // ── ANAMNÈSE ──
  {id:'anamnese',title:'Anamnèse',icon:'ti-user',items:[

const TPL_VERSION = '2.2';
let S={
  screen:'patients',
  patients:DB.get('podo_patients')||[],
  tpl:(DB.get('podo_tpl_version')===TPL_VERSION ? DB.get('podo_tpl') : null)||DEFAULT_TPL,
  curId:null,examData:{},filter:'',
  editCollapsed:{},histCollapsed:{},examTab:'new',
};

function save(){DB.set('podo_patients',S.patients);DB.set('podo_tpl',S.tpl);DB.set('podo_tpl_version',TPL_VERSION);}
function loadCustomConfigs(){
  const pc=DB.get('podo_posto_custom');if(pc){S.postoCustom=pc;Object.assign(POSTO_TESTS,pc);Object.keys(POSTO_TESTS).forEach(k=>{if(!pc[k])delete POSTO_TESTS[k];});}
  const sc=DB.get('podo_sport_custom');if(sc){S.sportCustom=sc;Object.assign(SPORT_TESTS,sc);Object.keys(SPORT_TESTS).forEach(k=>{if(!sc[k])delete SPORT_TESTS[k];});}
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function closeMod(){document.getElementById('moverlay').classList.remove('open');}

// ── NAVIGATION ──
function showScreen(s){
  S.screen=s;
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  const tabMap={patients:0,exam:1,posto:2,sport:3,conclusion:4,edit:5};
  const tabs=document.querySelectorAll('.tab');
  if(tabMap[s]!==undefined && tabs[tabMap[s]]) tabs[tabMap[s]].classList.add('active');
  if(s==='patients')renderPatients();
  if(s==='exam')renderExam();
  if(s==='posto')renderPosto();
  if(s==='sport')renderSport();
  if(s==='conclusion')renderConclusion();
  if(s==='edit')renderEdit();
}

// ── PATIENTS ──
function initials(p){return((p.prenom||'?')[0]+(p.nom||'?')[0]).toUpperCase();}
function age(ddn){if(!ddn)return'';const d=new Date(ddn);const a=Math.floor((Date.now()-d)/(365.25*24*3600*1000));return a>0?a+' ans':'';}
function filterPatients(q){S.filter=q;renderPatients();}

function renderPatients(){
  const q=S.filter.toLowerCase().trim();
  let list=S.patients;
  if(q)list=list.filter(p=>(p.nom+' '+p.prenom).toLowerCase().includes(q)||(p.prenom+' '+p.nom).toLowerCase().includes(q));
  document.getElementById('pcount').textContent=S.patients.length===0?'':q?`${list.length} résultat(s) sur ${S.patients.length}`:`${S.patients.length} patient(s)`;
  const el=document.getElementById('plist');
  if(!list.length){el.innerHTML=`<div class="empty"><i class="ti ti-user-search"></i><p>${q?'Aucun résultat.':'Aucun patient enregistré.'}</p></div>`;return;}
  el.innerHTML=list.map(p=>`
    <div class="pc" onclick="openPatient('${p.id}')">
      <div class="pav">${initials(p)}</div>
      <div class="pi">
        <div class="pn">${esc(p.prenom)} ${esc(p.nom)}</div>
        <div class="pm">${age(p.ddn)?age(p.ddn)+' · ':''}${esc(p.tel||'')}</div>
        <div class="pm" style="margin-top:2px;">${p.exams&&p.exams.length?`<span class="badge">${p.exams.length} examen(s) · ${p.exams[p.exams.length-1].date}</span>`:'<span class="badge gray">Pas encore d\'examen</span>'}</div>
      </div>
      <div class="pacts" onclick="event.stopPropagation()">
        <button class="ib" onclick="openPatient('${p.id}')"><i class="ti ti-clipboard-list"></i></button>
        <button class="ib danger" onclick="confirmDel('${p.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('');
}

function newPatient(){
  const id='p_'+Date.now();
  S.patients.unshift({id,nom:'',prenom:'',ddn:'',tel:'',adresse:'',exams:[]});
  S.curId=id;S.examData={};S.examTab='new';
  save();showScreen('exam');
}
function openPatient(id){S.curId=id;S.examData={};S.examTab='new';showScreen('exam');}
function confirmDel(id){
  const p=S.patients.find(x=>x.id===id);
  document.getElementById('mtitle').textContent='Supprimer le patient';
  document.getElementById('mmsg').textContent=`Supprimer définitivement le dossier de ${p.prenom} ${p.nom} ?`;
  document.getElementById('mconfirm').onclick=()=>{S.patients=S.patients.filter(x=>x.id!==id);if(S.curId===id)S.curId=null;save();renderPatients();closeMod();showToast('Patient supprimé');};
  document.getElementById('moverlay').classList.add('open');
}

// ── EXAM ──
function renderExam(){
  const p=S.patients.find(x=>x.id===S.curId);
  const nop=document.getElementById('exam-nop'),cont=document.getElementById('exam-content');
  if(!p){nop.style.display='';cont.innerHTML='';return;}
  nop.style.display='none';
  const hasExams=p.exams&&p.exams.length>0;
  let html=`<div class="pdetail-nav"><span class="pdetail-back" onclick="showScreen('patients')"><i class="ti ti-arrow-left" style="font-size:13px"></i> Patients</span><span style="color:var(--text3);">/</span><span style="font-size:13px;font-weight:600;">${esc(p.prenom)} ${esc(p.nom)}</span></div>
  <div class="pdetail-tabs">
    <button class="pdetail-tab${S.examTab==='new'?' active':''}" onclick="switchExamTab('new')"><i class="ti ti-plus" style="font-size:12px"></i> Nouvel examen</button>
    <button class="pdetail-tab${S.examTab==='hist'?' active':''}" onclick="switchExamTab('hist')"><i class="ti ti-history" style="font-size:12px"></i> Historique ${hasExams?'<span class="badge blue" style="margin-left:3px">'+p.exams.length+'</span>':''}</button>
  </div>`;
  if(S.examTab==='new'){
    html+=`<div class="card"><div class="card-hd"><i class="ti ti-id-badge"></i>Identité</div>
    <div class="pgrid">
      <div class="fg"><div class="flbl">Nom</div><input class="finput" value="${esc(p.nom)}" placeholder="Dupont" oninput="upP('nom',this.value)"></div>
      <div class="fg"><div class="flbl">Prénom</div><input class="finput" value="${esc(p.prenom)}" placeholder="Jean" oninput="upP('prenom',this.value)"></div>
      <div class="fg"><div class="flbl">Date de naissance</div><input class="finput" type="date" value="${p.ddn||''}" oninput="upP('ddn',this.value)"></div>
      <div class="fg"><div class="flbl">Téléphone</div><input class="finput" value="${esc(p.tel)}" placeholder="06 00 00 00 00" oninput="upP('tel',this.value)"></div>
      <div class="fg full"><div class="flbl">Adresse</div><input class="finput" value="${esc(p.adresse)}" placeholder="1 rue des Fleurs, Paris" oninput="upP('adresse',this.value)"></div>
    </div></div>`;
    S.tpl.forEach(sec=>{html+=renderSection(sec);});
    html+=`<button class="savebtn" onclick="saveExam()"><i class="ti ti-device-floppy"></i> Enregistrer l'examen</button>`;
  } else {
    if(!hasExams){html+=`<div class="empty"><i class="ti ti-clipboard-off"></i><p>Aucun examen enregistré.</p></div>`;}
    else{
      html+=`<div class="hist-list">`;
      [...p.exams].reverse().forEach((ex,ri)=>{
        const i=p.exams.length-1-ri;
        const open=!S.histCollapsed[i];
        html+=`<div class="hist-item"><div class="hist-hd" onclick="toggleHist(${i})">
          <i class="ti ti-calendar-event" style="font-size:15px;color:var(--teal);"></i>
          <span class="hist-date">Examen du ${ex.date}</span>
          ${i===p.exams.length-1?'<span class="badge" style="margin-right:4px;">Dernier</span>':''}
          <button class="ib" onclick="event.stopPropagation();loadExamForEdit(${i})"><i class="ti ti-edit"></i></button>
          <button class="ib danger" onclick="event.stopPropagation();confirmDelExam(${i})"><i class="ti ti-trash"></i></button>
          <i class="ti ti-chevron-down collapse-icon${open?' open':''}"></i>
        </div>`;
        if(open){
          html+=`<div class="hist-body">`;
          S.tpl.forEach(sec=>{
            const hasData=sec.items.some(it=>{const v=ex.data[it.id];return v&&(!Array.isArray(v)||v.length>0)&&v!=='';});
            if(!hasData)return;
            html+=`<div class="sect-label">${sec.title}</div>`;
            sec.items.forEach(it=>{
              const v=ex.data[it.id];if(!v||v===''||(Array.isArray(v)&&!v.length))return;
              html+=`<div class="hfield"><div class="hflbl">${esc(it.label)}</div><div class="hfval">`;
              if(Array.isArray(v))html+=`<div class="tags">`+v.map(x=>`<span class="tag">${esc(x)}</span>`).join('')+`</div>`;
              else html+=esc(v);
              html+=`</div></div>`;
            });
          });
          html+=`</div>`;
        }
        html+=`</div>`;
      });
      html+=`</div>`;
    }
  }
  cont.innerHTML=html;
}

function renderSection(sec){
  let h=`<div class="card"><div class="card-hd"><i class="ti ${sec.icon}"></i>${esc(sec.title)}</div>`;
  sec.items.forEach(it=>{
    const v=S.examData[it.id];
    h+=`<div style="margin-bottom:12px;"><div class="flbl" style="margin-bottom:5px;">${esc(it.label)}</div>`;
    if(it.type==='text') h+=`<input class="finput" value="${esc(v||'')}" placeholder="…" oninput="setV('${it.id}',this.value)">`;
    else if(it.type==='textarea') h+=`<textarea class="finput" placeholder="Notes libres…" oninput="setV('${it.id}',this.value)">${esc(v||'')}</textarea>`;
    else if(it.type==='radio'){
      h+=`<div class="rg">`;
      (it.options||[]).forEach(o=>{
        const safeO=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        h+=`<div class="ri${v===o?' sel':''}" onclick="setRadio('${it.id}','${safeO}',this)">${esc(o)}</div>`;
      });
      h+=`</div>`;
    }
    else if(it.type==='select'){
      h+=`<select class="sfield" onchange="setV('${it.id}',this.value)"><option value="">— Sélectionner —</option>`;
      (it.options||[]).forEach(o=>{h+=`<option${v===o?' selected':''}>${esc(o)}</option>`;});
      h+=`</select>`;
    }
    else if(it.type==='checks'){
      const chk=v||[];
      h+=`<div class="cg">`;
      (it.options||[]).forEach(o=>{
        const safeO=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        h+=`<div class="ci${chk.includes(o)?' chk':''}" onclick="togChk('${it.id}','${safeO}',this)"><div class="cb"><i class="ti ti-check"></i></div><span class="clbl">${esc(o)}</span></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;return h;
}

function setV(id,v){S.examData[id]=v;}
function setRadio(id,v,el){S.examData[id]=v;el.closest('.rg').querySelectorAll('.ri').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function togChk(id,v,el){if(!S.examData[id])S.examData[id]=[];const a=S.examData[id];const i=a.indexOf(v);if(i>=0){a.splice(i,1);el.classList.remove('chk');}else{a.push(v);el.classList.add('chk');}}
function upP(f,v){const p=S.patients.find(x=>x.id===S.curId);if(p)p[f]=v;}
function switchExamTab(tab){S.examTab=tab;renderExam();}
function toggleHist(i){S.histCollapsed[i]=!S.histCollapsed[i];renderExam();}
function loadExamForEdit(i){const p=S.patients.find(x=>x.id===S.curId);S.examData=JSON.parse(JSON.stringify(p.exams[i].data));S.examTab='new';renderExam();showToast('Examen chargé');}
function confirmDelExam(i){
  document.getElementById('mtitle').textContent="Supprimer l'examen";
  document.getElementById('mmsg').textContent='Supprimer cet examen définitivement ?';
  document.getElementById('mconfirm').onclick=()=>{const p=S.patients.find(x=>x.id===S.curId);p.exams.splice(i,1);save();closeMod();S.histCollapsed={};renderExam();showToast('Examen supprimé');};
  document.getElementById('moverlay').classList.add('open');
}
function saveExam(){
  const p=S.patients.find(x=>x.id===S.curId);if(!p)return;
  const now=new Date().toLocaleDateString('fr-FR');
  if(!p.exams)p.exams=[];
  p.exams.push({date:now,data:JSON.parse(JSON.stringify(S.examData))});
  save();showToast('Examen enregistré ✓');S.examData={};S.examTab='hist';S.histCollapsed={};renderExam();
}

      <div class="esbody" id="es-${si}" style="${S.editCollapsed[si]?'display:none':''}">
        <div class="fg" style="margin-bottom:10px;">
          <div class="flbl">Nom de la section</div>
          <input class="eiinput" value="${esc(sec.title)}" oninput="upSecTitle(${si},this.value)" style="width:100%">
        </div>
        ${sec.items.map((it,ii)=>`
          <div class="eir">
            <input class="eiinput" value="${esc(it.label)}" placeholder="Nom du champ" oninput="upItemLbl(${si},${ii},this.value)">
            <select class="tsel" onchange="upItemType(${si},${ii},this.value)">
              <option value="text"${it.type==='text'?' selected':''}>Texte</option>
              <option value="textarea"${it.type==='textarea'?' selected':''}>Zone texte</option>

              <option value="checks"${it.type==='checks'?' selected':''}>Cases à cocher</option>
            </select>
            <button class="ib danger" onclick="delItem(${si},${ii})"><i class="ti ti-trash"></i></button>
          </div>
          ${(it.type==='radio'||it.type==='checks')?`<div style="margin:0 0 8px;padding:7px;background:var(--surface2);border-radius:var(--radius-sm);"><div class="flbl" style="margin-bottom:3px;">Options (une par ligne)</div><textarea class="eiinput" style="width:100%;min-height:50px;" oninput="upItemOpts(${si},${ii},this.value)">${(it.options||[]).join('\n')}</textarea></div>`:''}
        `).join('')}
        <button class="addbtn" onclick="addItem(${si})"><i class="ti ti-plus"></i> Ajouter un champ</button>
      </div>
    </div>`).join('');
  html += `<button onclick="resetTemplate()" style="width:100%;padding:9px;border-radius:var(--radius-sm);border:1px dashed var(--red);background:var(--red-light);color:var(--red);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;"><i class="ti ti-refresh"></i> Réinitialiser aux valeurs par défaut</button>`;

  html += `<button class="savebtn" style="margin-top:12px;" onclick="saveTemplate()"><i class="ti ti-device-floppy"></i> Enregistrer</button>`;
  cont.innerHTML = html;
}

function togEsec(id){const el=document.getElementById(id);if(!el)return;el.style.display=el.style.display==='none'?'':'none';}

  if(!S.postoCustom[zk])return;

}

function savePostoCustom(){
  // Apply customizations to POSTO_TESTS live object
  Object.assign(POSTO_TESTS, S.postoCustom);

  showToast('Posturologie enregistrée ✓');
}

let postoData={};
function loadPostoData(){const p=S.patients.find(x=>x.id===S.curId);postoData=(p&&p.postoData)?JSON.parse(JSON.stringify(p.postoData)):{};}
function savePostoData(){const p=S.patients.find(x=>x.id===S.curId);if(!p)return;p.postoData=JSON.parse(JSON.stringify(postoData));save();showToast('Posturologie enregistrée ✓');}
function setSide(id,side,val,btn){
  if(!postoData[id])postoData[id]={};
  if(postoData[id][side]===val){postoData[id][side]=null;btn.classList.remove('pos','neg');}
  else{postoData[id][side]=val;btn.closest('.side-btns').querySelectorAll('.sbtn').forEach(b=>b.classList.remove('pos','neg'));btn.classList.add(val==='+'?'pos':'neg');}
}
function setPostoNote(id,val){if(!postoData[id])postoData[id]={};postoData[id].note=val;}

function renderPosto(){
  const p=S.patients.find(x=>x.id===S.curId);
  const nop=document.getElementById('posto-nop'),cont=document.getElementById('posto-content');
  if(!p){nop.style.display='';cont.innerHTML='';return;}
  nop.style.display='none';loadPostoData();
  let html=`<div class="pdetail-nav"><span class="pdetail-back" onclick="showScreen('patients')"><i class="ti ti-arrow-left" style="font-size:13px"></i> Patients</span><span style="color:var(--text3);">/</span><span style="font-size:13px;font-weight:600;">${esc(p.prenom)} ${esc(p.nom)}</span><span style="font-size:12px;color:var(--text3);"> — Posturologie</span></div>

  Object.entries(POSTO_TESTS).forEach(([zk,zone])=>{
    html+=`<div class="posto-section"><div class="posto-sec-title"><i class="ti ${zone.icon}"></i>${zone.title}</div>`;
    Object.entries(zone.subsections).forEach(([sub,tests])=>{
      html+=`<div class="posto-subsection">${sub}</div>`;
      tests.forEach(t=>{
        const d=postoData[t.id]||{};
        html+=`<div class="test-row">
          <div class="test-name">${esc(t.name)}<small>${esc(t.desc)}</small></div>
          <div class="test-side"><div class="side-lbl">Gauche</div><div class="side-btns">
            <button class="sbtn${d.G==='+'?' pos':''}" onclick="setSide('${t.id}','G','+',this)">+</button>
            <button class="sbtn${d.G==='-'?' neg':''}" onclick="setSide('${t.id}','G','-',this)">−</button>
          </div></div>
          <div class="test-side"><div class="side-lbl">Droit</div><div class="side-btns">
            <button class="sbtn${d.D==='+'?' pos':''}" onclick="setSide('${t.id}','D','+',this)">+</button>
            <button class="sbtn${d.D==='-'?' neg':''}" onclick="setSide('${t.id}','D','-',this)">−</button>
          </div></div>
          <div class="test-note-wrap"><textarea class="test-note" rows="1" placeholder="Note…" oninput="setPostoNote('${t.id}',this.value)">${esc(d.note||'')}</textarea></div>

let sportData={};
function loadSportData(){const p=S.patients.find(x=>x.id===S.curId);sportData=(p&&p.sportData)?JSON.parse(JSON.stringify(p.sportData)):{};}
function saveSportData(){const p=S.patients.find(x=>x.id===S.curId);if(!p)return;p.sportData=JSON.parse(JSON.stringify(sportData));save();showToast('Analyse sportive enregistrée ✓');}
function setSportVal(id,v){sportData[id]=v;}
function setSportRadio(id,v,el){sportData[id]=v;el.closest('.rg').querySelectorAll('.ri').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function setSportSelect(id,v,el){sportData[id]=v;el.classList.remove('ok','nok','lim');if(v==='OK')el.classList.add('ok');else if(v==='NOK')el.classList.add('nok');else if(v==='Limité')el.classList.add('lim');}
function setSportSideVal(id,side,v){if(!sportData[id])sportData[id]={};sportData[id][side]=v;}
function setSportBilRes(id,side,v,btn){
  if(!sportData[id])sportData[id]={};
  if(sportData[id][side]===v){sportData[id][side]=null;btn.classList.remove('pos','neg');}
  else{sportData[id][side]=v;btn.closest('.side-btns').querySelectorAll('.sbtn').forEach(b=>b.classList.remove('pos','neg'));btn.classList.add(v==='+'?'pos':'neg');}
}

function renderSport(){
  const p=S.patients.find(x=>x.id===S.curId);
  const nop=document.getElementById('sport-nop'),cont=document.getElementById('sport-content');
  if(!p){nop.style.display='';cont.innerHTML='';return;}
  nop.style.display='none';loadSportData();

    html+=`<div class="sport-section"><div class="sport-sec-title"><i class="ti ${zone.icon}"></i>${zone.title}</div>`;
    if(zone.fields){
      zone.fields.forEach(f=>{

        else if(f.type==='textarea') html+=`<textarea class="finput" oninput="setSportVal('${f.id}',this.value)">${esc(v||'')}</textarea>`;

          html+=`<div class="rg">`;
          (f.options||[]).forEach(o=>{const s=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");html+=`<div class="ri${v===o?' sel':''}" onclick="setSportRadio('${f.id}','${s}',this)">${esc(o)}</div>`;});
          html+=`</div>`;
        }
        html+=`</div>`;
      });
    }
    if(zone.subsections){
      Object.entries(zone.subsections).forEach(([sub,tests])=>{
        html+=`<div class="sport-subsection">${sub}</div>`;

          if(t.type==='score'){
            html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><input class="score-input" type="number" min="0" max="${t.max}" value="${esc(v||'')}" placeholder="—" oninput="setSportVal('${t.id}',this.value)"><div class="score-unit">${esc(t.unit)}</div></div>`;
          } else if(t.type==='score_bilateral'){
            const vg=(v&&v.G)||'';const vd=(v&&v.D)||'';
            html+=`<div class="test-side"><div class="side-lbl">Gauche</div><input class="score-input" type="number" min="0" max="${t.max}" value="${esc(vg)}" placeholder="—" oninput="setSportSideVal('${t.id}','G',this.value)"><div class="score-unit">${esc(t.unit)}</div></div>`;
            html+=`<div class="test-side"><div class="side-lbl">Droit</div><input class="score-input" type="number" min="0" max="${t.max}" value="${esc(vd)}" placeholder="—" oninput="setSportSideVal('${t.id}','D',this.value)"><div class="score-unit">${esc(t.unit)}</div></div>`;
          } else if(t.type==='bilateral_result'){
            const vg=(v&&v.G)||null;const vd=(v&&v.D)||null;
            html+=`<div class="test-side"><div class="side-lbl">Gauche</div><div class="side-btns"><button class="sbtn${vg==='+'?' pos':''}" onclick="setSportBilRes('${t.id}','G','+',this)">+</button><button class="sbtn${vg==='-'?' neg':''}" onclick="setSportBilRes('${t.id}','G','-',this)">−</button></div></div>`;
            html+=`<div class="test-side"><div class="side-lbl">Droit</div><div class="side-btns"><button class="sbtn${vd==='+'?' pos':''}" onclick="setSportBilRes('${t.id}','D','+',this)">+</button><button class="sbtn${vd==='-'?' neg':''}" onclick="setSportBilRes('${t.id}','D','-',this)">−</button></div></div>`;
          } else if(t.type==='select_result'){
            html+=`<select class="result-select${v==='OK'?' ok':v==='NOK'?' nok':v==='Limité'?' lim':''}" onchange="setSportSelect('${t.id}',this.value,this)"><option value="">—</option><option${v==='OK'?' selected':''}>OK</option><option${v==='NOK'?' selected':''}>NOK</option><option${v==='Limité'?' selected':''}>Limité</option></select>`;
          } else if(t.type==='radio_field'){
            html+=`<div class="rg">`;
            (t.options||[]).forEach(o=>{const s=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");html+=`<div class="ri${v===o?' sel':''}" onclick="setSportRadio('${t.id}','${s}',this)">${esc(o)}</div>`;});
            html+=`</div>`;
          } else if(t.type==='textarea_field'){
            html+=`<textarea class="finput" oninput="setSportVal('${t.id}',this.value)">${esc(v||'')}</textarea>`;
          }
          html+=`</div>`;
        });
      });
    }
    html+=`</div>`;
  });
  html+=`<button class="savebtn" style="background:var(--orange);" onclick="saveSportData()"><i class="ti ti-device-floppy"></i> Enregistrer l'analyse sportive</button>`;
  cont.innerHTML=html;
}

// ── CONCLUSION ──
function collectProblems(){
  const p=S.patients.find(x=>x.id===S.curId);if(!p)return[];
  const problems=[];
  const examD=S.examData;
  const neutrals=['Neutre','Normale','Normal','Normaux','Pied normal','Alignés'];
  S.tpl.forEach(sec=>{
    sec.items.forEach(it=>{
      const v=examD[it.id];
      if(!v||v===''||(Array.isArray(v)&&!v.length))return;
      if(it.type==='radio'&&!neutrals.includes(v)) problems.push({zone:sec.title,label:it.label,val:v,side:null,severity:'anomalie'});
      if(it.type==='checks'&&Array.isArray(v)) v.forEach(item=>problems.push({zone:sec.title,label:it.label,val:item,side:null,severity:'pathologie'}));
    });
  });
  const postoD=p.postoData||{};
  Object.entries(POSTO_TESTS).forEach(([zk,zone])=>{
    Object.entries(zone.subsections).forEach(([sub,tests])=>{
      tests.forEach(t=>{
        const d=postoD[t.id];if(!d)return;
        ['G','D'].forEach(side=>{if(d[side]==='+') problems.push({zone:zone.title,label:t.name,val:'Positif',side:side==='G'?'Gauche':'Droit',severity:'test_positif',note:d.note||''});});
      });
    });
  });
  const sportD=p.sportData||{};
  Object.entries(SPORT_TESTS).forEach(([zk,zone])=>{
    if(zone.subsections) Object.entries(zone.subsections).forEach(([sub,tests])=>{
      tests.forEach(t=>{
        const v=sportD[t.id];if(!v)return;
        if(t.type==='select_result'&&v==='NOK') problems.push({zone:'Sport — '+zone.title,label:t.name,val:'NOK',side:null,severity:'sport_nok'});
        if(t.type==='select_result'&&v==='Limité') problems.push({zone:'Sport — '+zone.title,label:t.name,val:'Limité',side:null,severity:'sport_limite'});
        if(t.type==='bilateral_result'&&typeof v==='object') ['G','D'].forEach(side=>{if(v[side]==='+') problems.push({zone:'Sport — '+zone.title,label:t.name,val:'Positif',side:side==='G'?'Gauche':'Droit',severity:'sport_nok'});});
        if(t.id==='fms_total'&&v&&Number(v)<14) problems.push({zone:'Sport — FMS',label:'Score FMS insuffisant',val:v+'/21 (seuil < 14)',side:null,severity:'sport_nok'});
      });
    });
  });
  return problems;
}

function renderConclusion(){
  const p=S.patients.find(x=>x.id===S.curId);
  const nop=document.getElementById('concl-nop'),cont=document.getElementById('concl-content');
  if(!p){nop.style.display='';cont.innerHTML='';return;}

  loadSportData();loadPostoData();
  const problems=collectProblems();
  const pathologies=problems.filter(x=>x.severity==='pathologie');
  const anomalies=problems.filter(x=>x.severity==='anomalie');

  let html=`<div class="pdetail-nav"><span class="pdetail-back" onclick="showScreen('patients')"><i class="ti ti-arrow-left" style="font-size:13px"></i> Patients</span><span style="color:var(--text3);">/</span><span style="font-size:13px;font-weight:600;">${esc(p.prenom)} ${esc(p.nom)}</span><span style="font-size:12px;color:var(--text3);"> — Conclusion</span></div>`;

  html+=block('Anomalies & déviations','ti-alert-circle','var(--orange)',anomalies,'Aucune anomalie renseignée');

    <textarea class="note-textarea" placeholder="Synthèse clinique, orientations, prescriptions…" oninput="saveConclusionNote(this.value)">${esc(p.conclusionNote||'')}</textarea></div>`;
  html+=`<button class="pdf-btn" onclick="exportMedicalPDF()"><i class="ti ti-file-text"></i> Générer le compte rendu PDF médical</button>`;
  cont.innerHTML=html;
}

  }

  S.tpl.forEach(sec=>{const items=[];sec.items.forEach(it=>{const v=examD[it.id];if(!v||v===''||(Array.isArray(v)&&!v.length))return;items.push({label:it.label,val:Array.isArray(v)?v.join(', '):v});});if(items.length)examSections.push({title:sec.title,items});});
  if(examSections.length){

    examSections.forEach(s=>{body+=`<div class="etitle">${s.title}</div>`;s.items.forEach(it=>{body+=`<div class="erow"><div class="elbl">${it.label}</div><div class="eval">`;if(it.val.includes(','))body+=it.val.split(',').map(v=>`<span class="tag">${v.trim()}</span>`).join('');else body+=it.val;body+=`</div></div>`;});});

  const sportSections=[];

  else showToast('Autorisez les popups pour imprimer');
}

function zoneColor(F, zones, alpha){
  for(const z of zones){if(F[z]&&F[z].length){const c=F[z][0].color;return hexAlpha(c,alpha||0.35);}}
  return 'transparent';
}
function zoneStroke(F, zones){
  for(const z of zones){if(F[z]&&F[z].length)return F[z][0].color;}
  return 'none';
}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function hasFinding(F,...zones){return zones.some(z=>F[z]&&F[z].length>0);}
